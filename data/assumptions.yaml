# Synthetic Data Assumptions
# All values are approximate weekly averages per region/category combination

baseline:
  traffic_weekly: 12000          # weekly site visits
  conversion_rate: 0.032         # 3.2% base conversion
  avg_order_value: 87.50         # USD
  marketing_spend_weekly: 8500   # USD
  return_rate: 0.09              # 9% of gross revenue
  margin_pct: 0.38               # 38% gross margin before marketing

seasonality:
  q1_index: 0.88   # Post-holiday dip
  q2_index: 0.95   # Spring pickup
  q3_index: 1.02   # Summer stable
  q4_index: 1.28   # Holiday surge

noise:
  traffic_std: 0.08        # 8% weekly variation
  conversion_std: 0.005    # 0.5pp variation
  aov_std: 0.04            # 4% variation
  marketing_std: 0.10      # 10% variation

region_multipliers:
  North America: 1.0
  Europe: 0.75
  Asia Pacific: 0.60
  Latin America: 0.35

category_multipliers:
  Electronics: 1.30
  Apparel: 0.90
  Home & Garden: 0.85
  Health & Beauty: 0.70
  Sports & Outdoors: 0.75

# Formulas (for documentation)
formulas:
  orders: "traffic * conversion_rate"
  gross_revenue: "orders * avg_order_value"
  refunds: "gross_revenue * return_rate"
  net_revenue: "gross_revenue - refunds"
  gross_margin: "(net_revenue * margin_pct) - marketing_spend"
  roas: "gross_revenue / marketing_spend"
  cac_proxy: "marketing_spend / orders"
